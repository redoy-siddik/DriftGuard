{% extends 'base.html' %}

{% block title %}Page Not Found — DriftGuard{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center px-4">
  <div class="w-20 h-20 bg-slate-800 border border-slate-700 rounded-2xl flex items-center justify-center text-blue-500 mb-6 shadow-xl">
    <i class="fa-solid fa-ghost text-4xl"></i>
  </div>
  <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">404 — Node or Page Not Found</h1>
  <p class="text-slate-400 max-w-md mb-8">The GPU telemetry resource or operational endpoint you are seeking does not exist or has been relocated.</p>
  <a href="{% url 'dashboard:index' %}" class="px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm transition-all shadow-lg shadow-blue-500/20">
    Return to Dashboard
  </a>
</div>
{% endblock %}
