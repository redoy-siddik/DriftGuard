{% extends 'base.html' %}

{% block title %}Server Error — DriftGuard{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center px-4">
  <div class="w-20 h-20 bg-rose-500/10 border border-rose-500/20 rounded-2xl flex items-center justify-center text-rose-500 mb-6 shadow-xl">
    <i class="fa-solid fa-bug text-4xl"></i>
  </div>
  <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">500 — Internal Pipeline Exception</h1>
  <p class="text-slate-400 max-w-md mb-8">An unhandled engine exception occurred while processing GPU metrics or ML models.</p>
  <a href="{% url 'dashboard:index' %}" class="px-5 py-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-white font-semibold text-sm transition-all border border-slate-700">
    Return to Safety
  </a>
</div>
{% endblock %}
