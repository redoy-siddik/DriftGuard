<aside class="w-64 bg-slate-800 border-r border-slate-700 min-h-screen flex flex-col justify-between p-4">
  <div class="space-y-6">
    <div class="px-3 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">
      Navigation
    </div>
    <nav class="space-y-1">
      <a href="{% url 'dashboard:index' %}" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'index' %}bg-blue-600 text-white shadow-md shadow-blue-500/20{% else %}text-slate-300 hover:bg-slate-700/60 hover:text-white{% endif %}">
        <i class="fa-solid fa-chart-line w-5 text-center"></i>
        <span>Dashboard</span>
      </a>

      <a href="{% url 'dashboard:alerts' %}" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'alerts' %}bg-blue-600 text-white shadow-md shadow-blue-500/20{% else %}text-slate-300 hover:bg-slate-700/60 hover:text-white{% endif %}">
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-triangle-exclamation w-5 text-center"></i>
          <span>Alerts</span>
        </div>
        <span id="sidebar-alert-badge" class="px-2 py-0.5 text-xs rounded-full bg-rose-500/20 text-rose-400 font-bold border border-rose-500/30">
          {{ open_alerts|default:0 }}
        </span>
      </a>
    </nav>

    <div class="pt-4 border-t border-slate-700/60">
      <div class="px-3 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">
        System Actions
      </div>
      <div class="space-y-2 mt-2 px-1">
        <button id="btn-trigger-detection" class="w-full text-left flex items-center space-x-2 px-3 py-2 rounded-lg text-xs font-medium bg-slate-900/60 hover:bg-slate-700 text-slate-300 hover:text-white border border-slate-700/60 transition-all">
          <i class="fa-solid fa-play text-blue-400"></i>
          <span>Run Detection Pipeline</span>
        </button>

        <button id="btn-trigger-train" class="w-full text-left flex items-center space-x-2 px-3 py-2 rounded-lg text-xs font-medium bg-slate-900/60 hover:bg-slate-700 text-slate-300 hover:text-white border border-slate-700/60 transition-all">
          <i class="fa-solid fa-brain text-purple-400"></i>
          <span>Train Isolation Forest</span>
        </button>
      </div>
    </div>
  </div>

  <div class="p-3 bg-slate-900/50 rounded-xl border border-slate-700/50 text-xs space-y-1">
    <div class="text-slate-400">Engine Mode</div>
    <div class="text-emerald-400 font-semibold flex items-center space-x-1.5">
      <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
      <span>Two-Layer AI Drift</span>
    </div>
  </div>
</aside>
