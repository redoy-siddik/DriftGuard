<div class="bg-slate-800 border border-slate-700/80 rounded-xl p-5 shadow-lg">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-base font-bold text-white flex items-center space-x-2">
        <i class="fa-solid fa-chart-area text-blue-400"></i>
        <span>{{ chart_title|default:"Drift Score History (48 Hours)" }}</span>
      </h3>
      <p class="text-xs text-slate-400 mt-0.5">Two-layer statistical baseline (Z-Score) & unsupervised anomaly (Isolation Forest)</p>
    </div>
    <div class="flex items-center space-x-4 text-xs font-medium">
      <div class="flex items-center space-x-1.5 text-amber-400">
        <span class="w-3 h-0.5 bg-amber-400 inline-block"></span>
        <span>Warning (2.0)</span>
      </div>
      <div class="flex items-center space-x-1.5 text-rose-400">
        <span class="w-3 h-0.5 bg-rose-400 inline-block"></span>
        <span>Critical (3.5)</span>
      </div>
    </div>
  </div>
  <div class="relative h-64 w-full">
    <canvas id="{{ canvas_id|default:'driftTimelineChart' }}"></canvas>
  </div>
</div>
