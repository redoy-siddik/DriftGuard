<div class="bg-slate-800 border border-slate-700/80 rounded-xl p-5 shadow-lg flex items-center justify-between">
  <div>
    <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">{{ title }}</div>
    <div class="text-2xl font-bold text-white font-mono" id="{{ card_id }}">{{ value }}</div>
    {% if subtitle %}
    <div class="text-xs text-slate-500 mt-1">{{ subtitle }}</div>
    {% endif %}
  </div>
  <div class="w-12 h-12 rounded-lg flex items-center justify-center {{ bg_color|default:'bg-blue-500/10' }} {{ text_color|default:'text-blue-400' }} border {{ border_color|default:'border-blue-500/20' }}">
    <i class="fa-solid {{ icon }} text-xl"></i>
  </div>
</div>
