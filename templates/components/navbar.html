<header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between shadow-md">
  <div class="flex items-center space-x-3">
    <a href="{% url 'dashboard:index' %}" class="flex items-center space-x-3 text-white font-bold text-xl tracking-wider">
      <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
        <i class="fa-solid font-bold fa-shield-halved text-lg"></i>
      </div>
      <span>DRIFT<span class="text-blue-500">GUARD</span></span>
    </a>
    <span class="text-xs px-2.5 py-0.5 rounded-full bg-blue-900/60 text-blue-300 font-mono border border-blue-700/50">v1.0 LTS</span>
  </div>

  <div class="flex items-center space-x-6">
    <div class="flex items-center space-x-2 bg-slate-900/60 border border-slate-700/60 px-3 py-1.5 rounded-lg text-xs font-medium">
      <span class="text-slate-400">Pipeline Status:</span>
      <span id="system-status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
      <span id="system-status-text" class="text-slate-200">Operational</span>
    </div>

    <div class="text-xs text-slate-400 font-mono">
      <i class="fa-regular fa-clock mr-1"></i>
      Last Run: <span id="nav-last-run" class="text-slate-200">{% if last_detection_run %}{{ last_detection_run|date:"Y-m-d H:i:s" }}{% else %}Never{% endif %}</span>
    </div>
  </div>
</header>
